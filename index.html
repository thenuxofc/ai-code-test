<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>✨ T‑NEX ULTRAMODEL Calculator ✨</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ---------- Global & Background ---------- */
:root {
  --bg-grad-1: #0f0c29;
  --bg-grad-2: #302b63;
  --card-bg: rgba(255,255,255,0.08);
  --card-glow: 0 8px 32px rgba(0,0,0,0.5);
  --accent: #6a11cb;
  --accent-light: #a64ceb;
  --text-primary: #e0e0e0;
  --text-secondary: #b0b0c0;
}
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html, body {
  height: 100%;
  font-family: 'Segoe UI', Tahoma, Helvetica, Arial, sans-serif;
  background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
  overflow: hidden;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

/* ---------- Container ---------- */
.container {
  width: 100%;
  max-width: 420px;
  padding: 2rem;
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  box-shadow: var(--card-glow);
  position: relative;
  overflow: hidden;
}

/* ---------- Header ---------- */
.header {
  text-align: center;
  margin-bottom: 1.5rem;
}
.header h1 {
  font-size: 1.8rem;
  font-weight: 600;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 1px;
}

/* ---------- Input ---------- */
.display {
  width: 100%;
  height: 70px;
  margin-bottom: .8rem;
  background: rgba(0,0,0,0.35);
  border: none;
  border-radius: 14px;
  text-align: right;
  font-size: 2rem;
  font-weight: 300;
  padding: 0 1rem;
  color: var(--text-primary);
  backdrop-filter: blur(8px);
}
.display::placeholder {
  color: var(--text-secondary);
}

/* ---------- Buttons Grid ---------- */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .6rem;
}
.btn {
  aspect-ratio: 1 / 1;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.07);
  color: var(--text-primary);
  font-size: 1.4rem;
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: all .15s ease;
  position: relative;
  overflow: hidden;
}
.btn:hover {
  background: rgba(255,255,255,0.12);
  transform: scale(1.05);
}
.btn:active {
  transform: scale(0.95);
}
.btn.operator {
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: #fff;
}
.btn.operator:hover {
  background: linear-gradient(135deg, #8a2be2, #d02090);
}

/* ---------- Ripple Effect ---------- */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transform: scale(0);
  animation: ripple 400ms linear;
  pointer-events: none;
}
@keyframes ripple {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

/* ---------- Secret Message ---------- */
.secret {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity .6s ease;
  color: #fff;
  font-size: 1.4rem;
  text-align: center;
  background: rgba(0,0,0,0.4);
  padding: 1rem 2rem;
  border-radius: 12px;
  pointer-events: none;
}
.secret.show {
  opacity: 1;
}

/* ---------- Footer ---------- */
.footer {
  margin-top: 2rem;
  text-align: center;
  font-size: .85rem;
  color: var(--text-secondary);
}

/* ---------- Responsive ---------- */
@media (max-width: 480px) {
  .display { font-size: 1.6rem; }
  .header h1 { font-size: 1.5rem; }
}
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <h1>🔮 Calculator</h1>
  </div>

  <input type="text" class="display" id="display" readonly placeholder="0">

  <div class="grid">
    <!-- Row 1 -->
    <button class="btn" data-key="clear">C</button>
    <button class="btn" data-key="backspace">←</button>
    <button class="btn" data-key="percent">%</button>
    <button class="btn operator" data-key="/">÷</button>

    <!-- Row 2 -->
    <button class="btn" data-key="7">7</button>
    <button class="btn" data-key="8">8</button>
    <button class="btn" data-key="9">9</button>
    <button class="btn operator" data-key="*">×</button>

    <!-- Row 3 -->
    <button class="btn" data-key="4">4</button>
    <button class="btn" data-key="5">5</button>
    <button class="btn" data-key="6">6</button>
    <button class="btn operator" data-key="-">−</button>

    <!-- Row 4 -->
    <button class="btn" data-key="1">1</button>
    <button class="btn" data-key="2">2</button>
    <button class="btn" data-key="3">3</button>
    <button class="btn operator" data-key="+">+</button>

    <!-- Row 5 -->
    <button class="btn" data-key="0">0</button>
    <button class="btn" data-key=".">.</button>
    <button class="btn" data-key="sqrt">√</button>
    <button class="btn operator" data-key="=">=</button>
  </div>

  <!-- Secret overlay -->
  <div class="secret" id="secretMessage">🎉 You found the hidden pattern! 🎉<br>Unlocked: <strong>T‑NEX ULTRAMODEL</strong></div>

  <div class="footer">
    <p>Built with ❤️ by <strong>T‑NEX ULTRAMODEL</strong></p>
  </div>
</div>

<script>
/* ---------- Utility ---------- */
const $ = selector => document.querySelector(selector);
const $$ = selector => Array.from(document.querySelectorAll(selector));

/* ---------- Display handling ---------- */
const display = $('#display');
let inputQueue = ''; // raw user input (including secret sequence)

function append(key) {
  // Show ripple on every key press
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.left = `${event.clientX - display.getBoundingClientRect().left}px`;
  ripple.style.top  = `${event.clientY - display.getBoundingClientRect().top}px`;
  display.parentElement.appendChild(ripple);
  setTimeout(() => ripple.remove(), 400);

  // Append to queue for secret detection
  inputQueue += key;
  // Trim to last 6 chars for easier checking
  if (inputQueue.length > 6) inputQueue = inputQueue.slice(-6);
  display.value = calculate(display.value, key);
}

/* ---------- Simple calculator logic ---------- */
function calculate(prev, key) {
  // Prevent multiple operators in a row
  if (['+', '-', '*', '/', '%'].includes(key) && /[+\-*/%]$/.test(prev)) {
    return prev.slice(0, -1) + key;
  }
  // Evaluate only when '=' is pressed
  if (key === '=') {
    try {
      // Use Function constructor for safe eval (no external code injection)
      return Function(`return ${prev}`)();
    } catch {
      return 'Error';
    }
  }
  // Append digit / decimal
  return prev === '0' && /[0-9.]/.test(key) ? key : prev + key;
}

/* ---------- Secret detection ---------- */
const secretPattern = '535688';
const secretEl = $('#secretMessage');

function checkSecret() {
  if (inputQueue === secretPattern) {
    secretEl.classList.add('show');
    // Reset after a short delay so it can be found again later
    setTimeout(() => secretEl.classList.remove('show'), 5000);
    // Optional: you could trigger a special animation or sound here
  }
}

/* ---------- Button wiring ---------- */
$$('button').forEach(btn => {
  btn.addEventListener('click', e => {
    const key = btn.dataset.key;
    append(key);
    checkSecret();
  });
});

/* ---------- Keyboard support ---------- */
document.addEventListener('keydown', e => {
  const key = e.key;
  if (/\d/.test(key)) append(key);
  else if (key === '.' ) append('.');
  else if (key === 'Enter') append('=');
  else if (key === 'Backspace') append('backspace');
  else if (key.toLowerCase() === 'c') append('clear');
  else if (key === 'Escape') append('clear');
  else if (['+', '-', '*', '/', '%'].includes(key)) append(key);
  else if (key === '(' || key === ')' ) append(key);
});

/* ---------- Clear & Backspace ---------- */
$('#clear').addEventListener('click', () => {
  display.value = '';
  inputQueue = '';
});
$('#backspace').addEventListener('click', () => {
  display.value = display.value.slice(0, -1);
  // Remove last char from queue
  inputQueue = inputQueue.slice(0, -1);
});

/* ---------- Hide secret on page load ---------- */
secretEl.classList.remove('show');
</script>
</body>
</html>
