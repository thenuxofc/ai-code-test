<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f4f8;
            font-family: 'Arial', sans-serif;
            margin: 0;
        }
        .calculator {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            width: 300px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .calculator-display {
            background: #2d3748;
            color: #ffffff;
            font-size: 2rem;
            padding: 20px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }
        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }
        .calculator-button {
            background: #e2e8f0;
            border: none;
            font-size: 1.5rem;
            padding: 20px;
            transition: background 0.3s, transform 0.3s;
            outline: none;
            cursor: pointer;
        }
        .calculator-button:hover {
            background: #cbd5e0;
        }
        .calculator-button:active {
            transform: scale(0.98);
        }
        .calculator-button.ac {
            background: #feb2b2;
        }
        .calculator-button.ac:hover {
            background: #f56565;
        }
        .calculator-button.equal {
            background: #48bb78;
            grid-column: span 2;
        }
        .calculator-button.equal:hover {
            background: #42996d;
        }
        .calculator-button.operator {
            background: #667eea;
        }
        .calculator-button.operator:hover {
            background: #639;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .calculator {
            animation: fadeIn 1s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="calculator-display" id="display">0</div>
        <div class="calculator-buttons">
            <button class="calculator-button ac" onclick="clearDisplay()">AC</button>
            <button class="calculator-button" onclick="appendNumber('7')">7</button>
            <button class="calculator-button" onclick="appendNumber('8')">8</button>
            <button class="calculator-button" onclick="appendNumber('9')">9</button>
            <button class="calculator-button operator" onclick="setOperation('/')">/</button>
            <button class="calculator-button" onclick="appendNumber('4')">4</button>
            <button class="calculator-button" onclick="appendNumber('5')">5</button>
            <button class="calculator-button" onclick="appendNumber('6')">6</button>
            <button class="calculator-button operator" onclick="setOperation('*')">*</button>
            <button class="calculator-button" onclick="appendNumber('1')">1</button>
            <button class="calculator-button" onclick="appendNumber('2')">2</button>
            <button class="calculator-button" onclick="appendNumber('3')">3</button>
            <button class="calculator-button operator" onclick="setOperation('-')">-</button>
            <button class="calculator-button" onclick="appendNumber('0')">0</button>
            <button class="calculator-button" onclick="appendNumber('.')">.</button>
            <button class="calculator-button equal" onclick="calculate()">=</button>
            <button class="calculator-button operator" onclick="setOperation('+')">+</button>
        </div>
    </div>

    <script>
        let currentInput = '';
        let previousInput = '';
        let operation = null;

        function clearDisplay() {
            currentInput = '';
            previousInput = '';
            operation = null;
            updateDisplay();
        }

        function appendNumber(number) {
            if (number === '.' && currentInput.includes('.')) return;
            currentInput += number;
            updateDisplay();
        }

        function setOperation(op) {
            if (currentInput === '') return;
            if (previousInput !== '') {
                calculate();
            }
            operation = op;
            previousInput = currentInput;
            currentInput = '';
        }

        function calculate() {
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(current)) return;
            switch (operation) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = prev / current;
                    break;
                default:
                    return;
            }
            currentInput = result;
            operation = null;
            previousInput = '';
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('display');
            display.innerText = currentInput || '0';
        }
    </script>
</body>
</html>
