<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Calculator</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .calculator {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 20px;
            width: 300px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .calculator:hover {
            transform: scale(1.05);
        }
        .display {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            font-size: 24px;
            color: white;
            margin-bottom: 20px;
            text-align: right;
            overflow: hidden;
            white-space: nowrap;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            padding: 20px;
            font-size: 20px;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
        }
        .button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .hidden-message {
            display: none;
            margin-top: 20px;
            font-size: 18px;
            color: #34eb9b;
            animation: fadeIn 1s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="button" onclick="appendNumber('7')">7</button>
            <button class="button" onclick="appendNumber('8')">8</button>
            <button class="button" onclick="appendNumber('9')">9</button>
            <button class="button" onclick="setOperation('/')">/</button>
            <button class="button" onclick="appendNumber('4')">4</button>
            <button class="button" onclick="appendNumber('5')">5</button>
            <button class="button" onclick="appendNumber('6')">6</button>
            <button class="button" onclick="setOperation('*')">*</button>
            <button class="button" onclick="appendNumber('1')">1</button>
            <button class="button" onclick="appendNumber('2')">2</button>
            <button class="button" onclick="appendNumber('3')">3</button>
            <button class="button" onclick="setOperation('-')">-</button>
            <button class="button" onclick="appendNumber('0')">0</button>
            <button class="button" onclick="clearDisplay()">C</button>
            <button class="button" onclick="calculateResult()">=</button>
            <button class="button" onclick="setOperation('+')">+</button>
        </div>
        <div class="hidden-message" id="hiddenMessage">🎉 Unlocked Hidden Message! 🎉</div>
    </div>

    <script>
        let currentInput = '';
        let firstOperand = null;
        let secondOperand = null;
        let currentOperation = null;
        const display = document.getElementById('display');
        const hiddenMessage = document.getElementById('hiddenMessage');

        function appendNumber(number) {
            currentInput += number;
            updateDisplay();
        }

        function setOperation(operation) {
            if (currentInput === '') return;
            if (firstOperand === null) {
                firstOperand = parseFloat(currentInput);
            } else if (currentOperation) {
                secondOperand = parseFloat(currentInput);
                firstOperand = calculate(firstOperand, secondOperand, currentOperation);
            }
            currentOperation = operation;
            currentInput = '';
        }

        function calculateResult() {
            if (currentInput === '' || currentOperation === null) return;
            secondOperand = parseFloat(currentInput);
            const result = calculate(firstOperand, secondOperand, currentOperation);
            currentInput = result.toString();
            firstOperand = null;
            secondOperand = null;
            currentOperation = null;
            updateDisplay();
        }

        function calculate(a, b, operation) {
            switch (operation) {
                case '+': return a + b;
                case '-': return a - b;
                case '*': return a * b;
                case '/': return a / b;
                default: return b;
            }
        }

        function clearDisplay() {
            currentInput = '';
            firstOperand = null;
            secondOperand = null;
            currentOperation = null;
            updateDisplay();
        }

        function updateDisplay() {
            display.textContent = currentInput || '0';
            if (currentInput === '535688') {
                hiddenMessage.style.display = 'block';
            } else {
                hiddenMessage.style.display = 'none';
            }
        }
    </script>
</body>
</html>
