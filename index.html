<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>✨ Premium Calculator ✨</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
/* ────────────────────── Global Styles ────────────────────── */
:root {
  --bg-grad-1: #1a1a2e;
  --bg-grad-2: #16213e;
  --primary: #00b894;
  --primary-dark: #009377;
  --text: #e0e0e0;
  --shadow: rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin:0; padding:0; }
html,body { height:100%; font-family: 'Segoe UI',system-ui,sans-serif; }
body {
  background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

/* ────────────────────── Calculator Container ────────────────────── */
.calc {
  width: 380px;
  background: rgba(0,0,0,0.6);
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 16px 32px 0 var(--shadow);
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}

/* ────────────────────── Animated Gradient Background ────────────────────── */
.calc::before {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at 30% 30%, #2c3e50, transparent 40%);
  animation: pulse 8s infinite;
}
@keyframes pulse {
  0%,100% { opacity:0.15; }
  50% { opacity:0.35; }
}

/* ────────────────────── Display ────────────────────── */
.display {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
  text-align:right;
  font-size:2.2rem;
  color:var(--text);
  backdrop-filter:blur(6px);
  min-height:70px;
  display:flex; align-items:center; justify-content:flex-end;
  overflow-x:auto;
}
.display span {
  word-break:break-all;
}

/* ────────────────────── Buttons Grid ────────────────────── */
.grid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:12px;
}
button {
  font-size:1.2rem;
  padding:16px;
  border:none;
  border-radius:12px;
  background: rgba(255,255,255,0.08);
  color:var(--text);
  cursor:pointer;
  transition:background .2s, transform .1s;
  backdrop-filter:blur(6px);
}
button:active {
  transform:scale(0.94);
}
button.operator {
  background: rgba(255,152,0,0.35);
  color:#ff9f43;
}
button.equal {
  background: var(--primary);
  color:#fff;
  grid-column: span 2;
}
button.clear {
  background: #ff4d4d;
  color:#fff;
}

/* ────────────────────── Ripple Effect ────────────────────── */
.ripple {
  position:absolute;
  border-radius:50%;
  background: rgba(255,255,255,0.25);
  transform:scale(0);
  animation: ripple 400ms linear;
  pointer-events:none;
}
@keyframes ripple {
  to { transform:scale(4); opacity:0; }
}

/* ────────────────────── Secret Unlocked Panel ────────────────────── */
.secret {
  position:absolute;
  top:12px; right:12px;
  width:30px;height:30px;
  background: var(--primary);
  border-radius:50%;
  opacity:0;
  transition:opacity .4s;
}
.secret.show { opacity:1; }
.secret-inner {
  position:absolute;
  inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:.8rem;
  color:#fff;
}
</style>
</head>

<body>
<div class="calc">
  <div class="display"><span id="display">0</span></div>

  <!-- Secret unlock badge -->
  <div class="secret" id="secretBadge"><span class="secret-inner">🔓</span></div>

  <div class="grid">
    <!-- Numbers -->
    <button data-key="7">7</button>
    <button data-key="8">8</button>
    <button data-key="9">9</button>
    <button data-key="/" class="operator">÷</button>

    <button data-key="4">4</button>
    <button data-key="5">5</button>
    <button data-key="6">6</button>
    <button data-key="*">×</button>

    <button data-key="1">1</button>
    <button data-key="2">2</button>
    <button data-key="3">3</button>
    <button data-key="-">−</button>

    <button data-key="0">0</button>
    <button data-key=".">.</button>
    <button id="clear">C</button>
    <button data-key="+">+</button>
  </div>

  <button class="equal" id="enter">Enter</button>
</div>

<script>
/* ────────────────────── Utility Helpers ────────────────────── */
const $ = selector => document.querySelector(selector);
const $$ = selector => Array.from(document.querySelectorAll(selector));

/* ────────────────────── State ────────────────────── */
let buffer = "0";           // current input value
let lastInputWasOperator = false;
let secretUnlocked = false;

/* ────────────────────── UI References ────────────────────── */
const display = $("#display");
const secretBadge = $("#secretBadge");
const buttons = $$("button[data-key]");
const clearBtn = $("#clear");
const enterBtn = $("#enter");

/* ────────────────────── Core Logic ────────────────────── */
function updateDisplay() {
  display.textContent = buffer;
}

/* Add ripple at a given point */
function addRipple(event) {
  const btn = event.currentTarget;
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement("span");
  ripple.className = "ripple";
  ripple.style.left = `${event.clientX - rect.left}px`;
  ripple.style.top  = `${event.clientY - rect.top}px`;
  btn.appendChild(ripple);
  // Remove after animation
  setTimeout(() => ripple.remove(), 400);
}

/* Handle key / button press */
function handlePress(key) {
  // -------- Secret detection ----------
  if (!secretUnlocked) {
    // accumulate typed digits into a hidden string
    const secretInput = $("#secretInput");
    if (secretInput) {
      secretInput.textContent += key;
      if (secretInput.textContent === "535688") {
        secretUnlocked = true;
        secretBadge.classList.add("show");
        // optional: flash the badge
        secretBadge.style.animation = "pulse 1s infinite";
      }
    }
  }

  // -------- Normal calculator logic ----------
  if (key === "Enter") {
    // treat as “=”
    evaluate();
    return;
  }
  if (key === "C") { clearAll(); return; }

  // Digits / decimal
  if (!isNaN(key) || key === ".") {
    if (lastInputWasOperator) { buffer = "0"; lastInputWasOperator = false; }
    buffer = buffer === "0" && key !== "." ? key : buffer + key;
    updateDisplay();
    return;
  }

  // Operators
  if (isNaN(key)) {
    if (lastInputWasOperator) {
      // replace the operator
      buffer.slice(-1) === key.slice(0) || (buffer = buffer.slice(0,-1) + key);
    } else {
      // add operator after a number
      if (buffer !== "" && buffer !== "0") {
        buffer += " " + key + " ";
        updateDisplay();
      }
      lastInputWasOperator = true;
    }
  }
}

/* Evaluate simple RPN-like expression */
function evaluate() {
  // Simple evaluation: "3 + 4 * 2" → 14 (left‑to‑right)
  const parts = buffer.split(" ");
  if (parts.length < 3) return;
  const a = parseFloat(parts[0]);
  const op = parts[1];
  const b = parseFloat(parts[2]);
  if (isNaN(a) || isNaN(b)) return;
  let result;
  switch (op) {
    case "+": result = a + b; break;
    case "-": result = a - b; break;
    case "×": result = a * b; break;
    case "÷": result = b !== 0 ? a / b : "∞"; break;
    default: return;
  }
  buffer = String(result);
  updateDisplay();
  lastInputWasOperator = true;
}

/* Clear everything */
function clearAll() {
  buffer = "0";
  lastInputWasOperator = false;
  updateDisplay();
}

/* ────────────────────── Event Listeners ────────────────────── */
buttons.forEach(btn => {
  btn.addEventListener("click", e => addRipple(e));
  btn.addEventListener("click", e => handlePress(e.currentTarget.dataset.key));
});

/* Keyboard support */
window.addEventListener("keydown", e => {
  const key = e.key;
  if (e.target.tagName === "INPUT") return; // ignore if typing in a field
  handlePress(key);
});

/* Secret input field (hidden) */
const secretInputHTML = `
  <input type="text" id="secretInput" autocomplete="off" style="
    position:absolute; left:-9999px; width:1px; height:1px; opacity:0;">
`;
$("body").insertAdjacentHTML("beforeend", secretInputHTML);
const secretInput = $("#secretInput");

/* Initial render */
updateDisplay();

/* Animation for secret badge on unlock */
const pulse = [
  { transform: "scale(1)" },
  { transform: "scale(1.4)" },
  { transform: "scale(1)" }
];
secretBadge.animate(pulse, { duration:1000, iterations:Infinity });
</script>
</body>
</html>
