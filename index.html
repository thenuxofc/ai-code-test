<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🚀 Premium Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f172a;
    --card-bg: rgba(255,255,255,.07);
    --primary: #6366f1;
    --primary-light: #a5b4fc;
    --accent: #10b981;
    --text: #e2e8f0;
    --shadow: 0 8px 32px 0 rgba(0,0,0,.37);
    --radius: .75rem;
    --transition: all .3s cubic-bezier(.4,0,.2,1);
  }

  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .calculator {
    width: 360px;
    max-width: 100%;
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    backdrop-filter: blur(12px);
    color: var(--text);
    position: relative;
  }

  .display {
    padding: 1.25rem 1rem;
    font-size: 1.75rem;
    font-weight: 600;
    text-align: right;
    letter-spacing: .5px;
    background: rgba(0,0,0,.15);
    backdrop-filter: blur(6px);
    transition: var(--transition);
  }
  .display:focus { outline:none; }

  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: .5rem;
  }
  button {
    padding: .75rem;
    font-size: 1.125rem;
    font-weight: 500;
    border: none;
    border-radius: var(--radius);
    background: rgba(255,255,255,.08);
    color: var(--text);
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .4rem;
  }
  button:hover { background: rgba(255,255,255,.12); }
  button:active {
    transform: scale(0.96);
    background: rgba(255,255,255,.2);
  }
  .op { background: var(--accent); color:#fff; }
  .op:hover { background: #059669; }
  .func { background: var(--primary-light); color:#fff; }
  .func:hover { background: var(--primary); }
  .wide { grid-column: span 2; }

  /* Ripple effect */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    background: rgba(255,255,255,.3);
    animation: ripple 400ms linear;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity:0; }
  }

  /* Secret page */
  .secret {
    position: absolute;
    inset:0;
    background: rgba(0,0,0,.9);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:#fff;
    font-size:1.5rem;
    backdrop-filter: blur(8px);
  }
  .secret a {
    margin-top:.8rem;
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
  }
</style>
</head>

<body>
<div class="calculator" id="calc">
  <div class="display" id="screen" tabindex="0">0</div>
  <div class="keys">
    <button class="func wide" data-func="C">Clear</button>
    <button class="func wide" data-func="±">±</button>
    <button class="func wide" data-func="%">%</button>
    <button class="op">÷</button>

    <button data-key="7">7</button>
    <button data-key="8">8</button>
    <button data-key="9">9</button>
    <button class="op">×</button>

    <button data-key="4">4</button>
    <button data-key="5">5</button>
    <button data-key="6">6</button>
    <button class="op">‑</button>

    <button data-key="1">1</button>
    <button data-key="2">2</button>
    <button data-key="3">3</button>
    <button class="op">+</button>

    <button class="wide" data-key="0">0</button>
    <button data-key=".">.</button>
    <button class="op" data-func="√">√</button>
    <button class="op" data-func="^">xʸ</button>
  </div>
</div>

<!-- Secret page overlay -->
<div class="secret" id="secretOverlay">
  <h2>🔓 Secret Mode Unlocked!</h2>
  <p>Welcome, elite builder. Here’s a hidden dashboard.</p>
  <a href="#" id="secretLink">Open Dashboard</a>
</div>

<script>
  // ==== Core State ====
  const screen = document.getElementById('screen');
  const calc   = document.getElementById('calc');
  const secret = document.getElementById('secretOverlay');
  const secretLink = document.getElementById('secretLink');

  let expression = '';
  let lastKey = null;
  const secretCode = '1234'; // simple secret sequence  let entered = '';

  // ==== Helper Functions ====
  const append = (val) => {
    expression += val;
    screen.textContent = formatDisplay(expression);
  };

  const formatDisplay = (exp) => {
    // Show up to 12 chars, add thousand separators
    if (exp.length > 12) return exp.slice(0,12) + '…';
    return exp.replace(/(\d)(?=(?:\d{3})+(?!\d))/g, '$1,');
  };

  const evaluate = () => {
    try {
      // Replace keyboard symbols with JS equivalents
      const js = expression
        .replace(/÷/g, '/')
        .replace(/×/g, '*')
        .replace(/‑/g, '-')
        .replace(/√/g, 'Math.sqrt')
        .replace(/^ /g, '**')
        .replace(/π/g, 'Math.PI')
        .replace(/e/g, 'Math.E');
      const result = Function('return ' + js)();
      screen.textContent = formatDisplay(result.toString());
      expression = result.toString();
    } catch {
      screen.textContent = 'Error';
      expression = '';
    }
  };

  const clear = () => {
    expression = '';
    screen.textContent = '0';
  };

  const toggleSign = () => {
    if (!expression || expression === '0') return;
    expression = (parseFloat(expression) * -1).toString();
    screen.textContent = formatDisplay(expression);
  };

  const percent = () => {
    if (!expression) return;
    expression = (parseFloat(expression) / 100).toString();
    screen.textContent = formatDisplay(expression);
  };

  const sqrt = () => {
    if (!expression) return;
    const val = Math.sqrt(parseFloat(expression));
    screen.textContent = formatDisplay(val);
    expression = val.toString();
  };

  // ==== Event Listeners ====
  // Buttons
  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const btnRect = btn.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.left = `${e.clientX - btnRect.left}px`;
      ripple.style.top  = `${e.clientY - btnRect.top}px`;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 400);

      const key = btn.dataset.key;
      const func  = btn.dataset.func;

      if (key) append(key);
      else if (func) handleFunc(func);
    });
  });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (key >= '0' && key <= '9' || key === '.' || key === ',' ) {
      e.preventDefault();
      append(key === ',' ? '.' : key);
    } else if (key === '+' || key === '-' || key === '*' || key === '/' ) {
      e.preventDefault();
      const map = { '+':'add', '-':'sub', '*':'mul', '/':'div' };
      // we just append the symbol; complex ops handled later
      append(key);
    } else if (key === 'Enter') {
      e.preventDefault(); evaluate();
    } else if (key === 'Backspace') {
      e.preventDefault(); expression = expression.slice(0,-1); screen.textContent = formatDisplay(expression||'0'); }
    else if (key === 'Escape') clear();
    else if (key === 'p' || key === 'P') toggleSign();
    else if (key === '%') percent();
    else if (key === 's' || key === 'S') sqrt();
    else if (key === '`') { // secret trigger
      entered += '1';
      if (entered === secretCode) unlockSecret();
      else entered = entered.slice(-1);
    }
  });

  // ==== Function Handlers ====
  const handleFunc = (fn) => {
    switch (fn) {
      case 'C': clear(); break;
      case '±': toggleSign(); break;
      case '%': percent(); break;
      case '√': sqrt(); break;
      case '^': append('**'); break;
      default: /* nothing */ }
  };

  // ==== Secret Unlock ====
  function unlockSecret() {
    secret.style.display = 'flex';
    secret.querySelector('h2').style.transform = 'scale(1)';
    // animate in
    setTimeout(() => secret.style.opacity = '1', 10);
  }

  secretLink.addEventListener('click', (e) => {
    e.preventDefault();
    // In a real app you could route to /dashboard
    alert('🚀 Opening hidden dashboard...');
  });
</script>
</body>
</html>
